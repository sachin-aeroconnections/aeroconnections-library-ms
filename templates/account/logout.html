<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Logged Out - AeroConnections Library</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <script>
 tailwind.config = {
 theme: {
 extend: {
 colors: {
 primary: { DEFAULT: '#DA291C', dark: '#B8231A', light: '#FEE2E2' },
 'light-grey': '#C8C9C7',
 'dark-grey': '#5B6770',
 }
 }
 }
 }
 </script>
 <style>
 .animated-bg {
 position: fixed;
 top: 0;
 left: 0;
 width: 100%;
 height: 100%;
 z-index: -1;
 overflow: hidden;
 background: linear-gradient(135deg, #5B6770 0%, #3d454d 100%);
 }
 
 .animated-bg::before {
 content: '';
 position: absolute;
 top: 0;
 left: 0;
 width: 100%;
 height: 100%;
 background: radial-gradient(circle at 20% 80%, rgba(218, 41, 28, 0.2) 0%, transparent 50%),
 radial-gradient(circle at 80% 20%, rgba(218, 41, 28, 0.15) 0%, transparent 50%);
 animation: pulse-bg 8s ease-in-out infinite;
 }
 
 @keyframes pulse-bg {
 0%, 100% { opacity: 0.6; transform: scale(1); }
 50% { opacity: 1; transform: scale(1.05); }
 }
 
 .floating-shapes { position: absolute; width: 100%; height: 100%; overflow: hidden; }
 .shape { position: absolute; opacity: 0.15; animation: float 20s infinite ease-in-out; }
 .shape-1 { width: 400px; height: 400px; background: linear-gradient(135deg, #DA291C 0%, transparent 70%); border-radius: 50%; top: -150px; left: -150px; }
 .shape-2 { width: 300px; height: 300px; background: linear-gradient(135deg, #C8C9C7 0%, transparent 70%); border-radius: 50%; bottom: -100px; right: -100px; animation-delay: -5s; }
 
 @keyframes float {
 0%, 100% { transform: translate(0, 0); }
 50% { transform: translate(20px, -20px); }
 }
 
 .particles { position: absolute; width: 100%; height: 100%; }
 .particle { position: absolute; width: 4px; height: 4px; background: rgba(218, 41, 28, 0.5); border-radius: 50%; animation: drift 15s infinite linear; }
 
 @keyframes drift {
 0% { transform: translateY(100vh); opacity: 0; }
 10% { opacity: 1; }
 90% { opacity: 1; }
 100% { transform: translateY(-100vh); opacity: 0; }
 }
 
 .gradient-overlay {
 position: absolute;
 width: 200%;
 height: 200%;
 top: -50%;
 left: -50%;
 background: conic-gradient(from 0deg at 50% 50%, rgba(218, 41, 28, 0.05) 0deg, transparent 60deg, rgba(200, 201, 199, 0.03) 120deg, transparent 180deg, rgba(218, 41, 28, 0.05) 240deg, transparent 300deg, rgba(200, 201, 199, 0.03) 360deg);
 animation: rotate-gradient 30s linear infinite;
 }
 
 @keyframes rotate-gradient {
 from { transform: rotate(0deg); }
 to { transform: rotate(360deg); }
 }
 
 .logout-card {
 animation: slideUp 0.6s ease-out;
 }
 
 @keyframes slideUp {
 from { opacity: 0; transform: translateY(30px); }
 to { opacity: 1; transform: translateY(0); }
 }
 </style>
</head>
<body class="min-h-screen">
 <div class="animated-bg">
 <div class="floating-shapes">
 <div class="shape shape-1"></div>
 <div class="shape shape-2"></div>
 </div>
 <div class="particles" id="particles"></div>
 <div class="gradient-overlay"></div>
 </div>
 
 <div class="w-full max-w-md min-h-screen d-flex align-items-center justify-content-center px-4">
 <div class="logout-card w-full text-center">
 <div class="card/95 backdrop-blur-lg rounded-2xl shadow-sm-2xl p-8 border border-white/20">
 <div class="w-16 h-16 bg-success-light rounded-full d-flex align-items-center justify-content-center mb-6">
 <svg class="w-8 h-8 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
 </svg>
 </div>
 
 <h1 class="text-2xl font-bold text-dark-grey mb-2">You've been logged out</h1>
 <p class="text-dark-grey/70 mb-6">Thank you for using AeroConnections Library.</p>
 
 <a href="{% url 'account_login' %}" 
 class="inline-block w-full bg-primary hover:bg-primary-dark text-white font-medium py-3 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
 Sign In Again
 </a>
 </div>
 </div>
 </div>
 
 <script>
 const particlesContainer = document.getElementById('particles');
 for (let i = 0; i < 15; i++) {
 const particle = document.createElement('div');
 particle.className = 'particle';
 particle.style.left = Math.random() * 100 + '%';
 particle.style.animationDelay = Math.random() * 15 + 's';
 const colors = ['rgba(218, 41, 28, 0.6)', 'rgba(200, 201, 199, 0.5)'];
 particle.style.background = colors[Math.floor(Math.random() * colors.length)];
 particlesContainer.appendChild(particle);
 }
 </script>
</body>
</html>
