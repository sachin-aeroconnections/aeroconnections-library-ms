services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DEBUG=False
      - SECRET_KEY=change-this-secret-key-in-production
      # REQUIRED: set these for your deployment
      # - ALLOWED_HOSTS=library.yourdomain.com
      # - CSRF_TRUSTED_ORIGINS=https://library.yourdomain.com

volumes:
  db_data:
  static_volume:
  media_volume:
